{% extends 'core/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width:420px;margin:3rem auto">
  <div class="card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:.5rem">🐄</div>
      <h1 style="font-family:'Sora',sans-serif;font-weight:800;font-size:1.6rem;color:var(--green)">Welcome Back</h1>
      <p style="color:var(--text-muted);font-size:.88rem;margin-top:.4rem">Login to your farm dashboard</p>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control" placeholder="Your username" autofocus required/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" placeholder="Your password" required/>
      </div>
      {% if form.non_field_errors %}
      <div class="alert alert-error">{{ form.non_field_errors.0 }}</div>
      {% endif %}
      <button type="submit" class="btn btn-primary btn-block">🔑 Login to Farm</button>
    </form>
    <p style="text-align:center;margin-top:1rem;font-size:.875rem;color:var(--text-muted)">
      No account yet? <a href="{% url 'register' %}" style="color:var(--green);font-weight:600">Register your farm</a>
    </p>
  </div>
</div>
{% endblock %}
